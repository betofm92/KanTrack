server {
    listen       4200;
    server_name  localhost;

    # Disable nginx version in headers
    server_tokens off;

    location / {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ /index.html =404;
        # index.html: never cache, always revalidate
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Serve runtime config with no cache
    location = /fleetbase.config.json {
        root /usr/share/nginx/html;
        default_type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files /fleetbase.config.json =404;
    }

    # Fingerprinted assets (JS/CSS/fonts with hash in filename) — cache forever
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images and icons — cache 30 days
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # HTML files — never cache
    location ~* \.html$ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }
}