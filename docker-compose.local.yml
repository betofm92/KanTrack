# docker-compose.local.yml
# Configuración para desarrollo LOCAL - permite correr la consola manualmente
# USO: docker compose -f docker-compose.local.yml up -d
# La consola NO está incluida, se ejecuta localmente con: pnpm start

services:
  cache:
    image: redis:4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3307:3306"  # Puerto 3307 en host para evitar conflictos con MySQL local
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "trackbase"
    volumes:
      - ./docker/database/:/docker-entrypoint-initdb.d/
      - mysql_data_local:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  socket:
    image: socketcluster/socketcluster:v17.4.0
    restart: unless-stopped
    ports:
      - "38000:8000"
    environment:
      SOCKETCLUSTER_WORKERS: 10
      SOCKETCLUSTER_BROKERS: 10

  scheduler:
    image: fleetbase/fleetbase-api:latest
    command: ["go-crond", "--verbose", "root:./crontab"]
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://root@database/trackbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      REDIS_URL: tcp://cache
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy

  queue:
    image: fleetbase/fleetbase-api:latest
    command: ["php", "artisan", "queue:work", "--sleep=2", "--tries=3"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "queue:status"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      DATABASE_URL: "mysql://root@database/trackbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      REDIS_URL: tcp://cache
      MAIL_FROM_NAME: Fleetbase
      MAIL_MAILER: smtp
      MAIL_HOST: sandbox.smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USERNAME: 79e8629fd3fb41
      MAIL_PASSWORD: b0e9c1b266e2c0
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: from@example.com
      DEMO_MODE: 'true'
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy

  application:
    image: fleetbase/fleetbase-api:latest
    ports:
      - "8000:8000"
    volumes:
      - ./api/.env:/fleetbase/api/.env
      # Descomenta para montar código local de la API:
      # - ./api:/fleetbase/api:cached
      # Descomenta para montar paquetes locales:
      - ./packages/fleetops:/fleetbase/api/vendor/fleetbase/fleetops-api
    environment:
      APP_URL: http://localhost:8000
      ENVIRONMENT: development
      DATABASE_URL: "mysql://root@database:3306/trackbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      CONSOLE_HOST: http://localhost:4200
      FRONTEND_HOSTS: http://localhost:4200
      REDIS_URL: tcp://cache
      SESSION_DOMAIN: localhost
      BROADCAST_DRIVER: socketcluster
      SOCKETCLUSTER_HOST: localhost
      SOCKETCLUSTER_PORT: 38000
      MAIL_FROM_NAME: Fleetbase
      MAIL_MAILER: smtp
      MAIL_HOST: sandbox.smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USERNAME: 79e8629fd3fb41
      MAIL_PASSWORD: b0e9c1b266e2c0
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: from@example.com
      APP_NAME: KanTrack
      LOG_CHANNEL: daily
      REGISTRY_HOST: https://registry.fleetbase.io
      REGISTRY_PREINSTALLED_EXTENSIONS: 'true'
      OSRM_HOST: https://router.project-osrm.org
      DEMO_MODE: 'true'
      SANCTUM_TOKEN_EXPIRATION: '${DEMO_MINUTES}'
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      queue:
        condition: service_started

networks:
  default:
    driver: bridge

volumes:
  mysql_data_local:
    driver: local
