services:
  cache:
    image: redis:4-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1500m
    mem_reservation: 512m

  database:
    mem_limit: 1500m
    mem_reservation: 1024m
    image: mysql:8.0
    volumes:
      - ./mysql-conf/my.cnf:/etc/mysql/conf.d/zz-custom.cnf:ro
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "trackbase"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  socket:
    image: socketcluster/socketcluster:v17.4.0
    mem_limit: 2g
    restart: unless-stopped
    ports:
      - "38000:8000"
    environment:
      SOCKETCLUSTER_WORKERS: 2
      SOCKETCLUSTER_BROKERS: 2

  scheduler:
    image: local-fleetbase-api:latest
    command: >
      sh -lc "php artisan queue:work
      --sleep=2
      --tries=3
      --timeout=120
      --memory=256
      --max-jobs=200
      --max-time=3600"
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://root@database/trackbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      REDIS_URL: tcp://cache
    depends_on:
      - database
      - cache

  queue:
    image: local-fleetbase-api:latest
    command: ["php", "artisan", "queue:work"]
    mem_limit: 1500m
    mem_reservation: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "queue:status"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      DATABASE_URL: "mysql://root@database/trackbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      REDIS_URL: tcp://cache
      MAIL_FROM_NAME: "Fleetbase"
      MAIL_MAILER: "smtp"
      MAIL_HOST: "sandbox.smtp.mailtrap.io"
      MAIL_PORT: 2525
      MAIL_USERNAME: "79e8629fd3fb41"
      MAIL_PASSWORD: "b0e9c1b266e2c0"
      MAIL_ENCRYPTION: "tls"
      MAIL_FROM_ADDRESS: "from@example.com"
    depends_on:
      - database
      - cache

  console:
    build:
      context: .
      dockerfile: ./console/Dockerfile
      args:
        ENVIRONMENT: production
    ports:
      - "4200:4200"
    volumes:
      # IMPORTANTE: El archivo debe existir en esta ruta
      - ./console/fleetbase.config.json:/usr/share/nginx/html/fleetbase.config.json:ro
    environment:
      # Variables para depuración (interno, no dominio público)
      API_HOST: "http://application:8000"
      # SOCKET_HOST: "socket"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/health.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      application:
        condition: service_healthy
      socket:
        condition: service_started
    restart: unless-stopped
    networks:
      - default

  application:
    image: local-fleetbase-api:latest
      #  - ./api/.env:/fleetbase/api/.env
      # - ./api:/fleetbase/api:cached
      # - ./packages/fleetops:/fleetbase/api/vendor/fleetbase/fleetops-api
    mem_limit: 2g

    environment:
      # URL pública detrás de Nginx + SSL
      APP_URL: "https://kantrack.tech"
      ENVIRONMENT: "production"

      DATABASE_URL: "mysql://root@database:3306/trackbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache

      # Dónde vive la consola vista por el usuario (dominio público)
      CONSOLE_HOST: "https://kantrack.tech"
      FRONTEND_HOSTS: "https://kantrack.tech"

      REDIS_URL: tcp://cache

      # Dominio de sesión para cookies
      SESSION_DOMAIN: "kantrack.tech"

      BROADCAST_DRIVER: "socketcluster"
      MAIL_FROM_NAME: "Fleetbase"
      MAIL_MAILER: "smtp"
      MAIL_HOST: "sandbox.smtp.mailtrap.io"
      MAIL_PORT: 2525
      MAIL_USERNAME: "79e8629fd3fb41"
      MAIL_PASSWORD: "b0e9c1b266e2c0"
      MAIL_ENCRYPTION: "tls"
      MAIL_FROM_ADDRESS: "from@example.com"
      APP_NAME: "Fleetbase"
      LOG_CHANNEL: "daily"
      REGISTRY_HOST: "https://registry.fleetbase.io"
      REGISTRY_PREINSTALLED_EXTENSIONS: "true"
      OSRM_HOST: "https://router.project-osrm.org"
    depends_on:
      - database
      - cache
      - queue
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  httpd:
    build:
      context: .
      dockerfile: docker/httpd/Dockerfile
    ports:
      - "8000:80"
    depends_on:
      - application

networks:
  default:
    driver: bridge
