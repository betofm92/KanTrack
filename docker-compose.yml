services:
  cache:
    image: redis:4-alpine
    restart: unless-stopped
    mem_limit: 96m
    mem_reservation: 48m
    pids_limit: 100
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: mysql:8.0-oracle
    restart: always
    mem_limit: 1024m
    mem_reservation: 512m
    pids_limit: 512
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc: 4096
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "kantrack"
    volumes:
      - ./docker/database/:/docker-entrypoint-initdb.d/
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 60s

  socket:
    image: socketcluster/socketcluster:v17.4.0
    restart: unless-stopped
    mem_limit: 192m
    mem_reservation: 96m
    pids_limit: 256
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc: 4096
    ports:
      - "38000:8000"
    environment:
      SOCKETCLUSTER_WORKERS: 1
      SOCKETCLUSTER_BROKERS: 1

  scheduler:
    image: local-fleetbase-api:latest
    command: ["go-crond", "--verbose", "root:./crontab"]
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 128
    tmpfs:
      - /tmp:size=64m
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      REDIS_URL: tcp://cache
    depends_on:
      - database
      - cache

  queue:
    image: local-fleetbase-api:latest
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--memory=96", "--max-jobs=30", "--max-time=900"]
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 256
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc: 4096
    tmpfs:
      - /tmp:size=128m
    healthcheck:
      test: ["CMD", "php", "artisan", "queue:status"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      REDIS_URL: tcp://cache
      APP_URL: "${APP_URL}"
      APP_NAME: "${APP_NAME:-KanTrack}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_LOCALE: "${APP_LOCALE:-es}"
      CONSOLE_HOST: "${CONSOLE_HOST}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME}"
      MAIL_MAILER: "${MAIL_MAILER}"
      MAIL_HOST: "${MAIL_HOST}"
      MAIL_PORT: "${MAIL_PORT}"
      MAIL_USERNAME: "${MAIL_USERNAME}"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
      FIREBASE_CREDENTIALS: "${FIREBASE_CREDENTIALS}"
    depends_on:
      - database
      - cache

  console:
    image: kantrack-console:latest
    build:
      context: .
      dockerfile: ./console/Dockerfile
      args:
        ENVIRONMENT: production
    ports:
      - "4200:4200"
    volumes:
      - ./console/fleetbase.config.json:/usr/share/nginx/html/fleetbase.config.json:ro
    environment:
      API_HOST: "http://application:8000"
      SOCKET_HOST: "socket"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/health.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      application:
        condition: service_healthy
      socket:
        condition: service_started
    restart: unless-stopped
    mem_limit: 64m
    mem_reservation: 32m
    pids_limit: 128
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc: 2048
    tmpfs:
      - /tmp:size=32m
    networks:
      - default

  application:
    image: local-fleetbase-api:latest
      # command: php artisan serve --host=0.0.0.0 --port=8000
      #  - ./api/.env:/fleetbase/api/.env
      # - ./api:/fleetbase/api:cached
      # - ./packages/fleetops:/fleetbase/api/vendor/fleetbase/fleetops-api
    volumes:
      - fonts_cache:/fleetbase/api/storage/fonts
    environment:
      APP_URL: "${APP_URL}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_ENV: "${APP_ENV:-production}"
      ENVIRONMENT: "${APP_ENV:-production}"

      DATABASE_URL: "${DATABASE_URL}"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      REDIS_URL: tcp://cache

      CONSOLE_HOST: "${CONSOLE_HOST}"
      FRONTEND_HOSTS: "${FRONTEND_HOSTS}"

      SESSION_DOMAIN: "${SESSION_DOMAIN}"
      SESSION_DRIVER: "redis"

      BROADCAST_DRIVER: "socketcluster"
      FIREBASE_CREDENTIALS: "${FIREBASE_CREDENTIALS}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME}"
      MAIL_MAILER: "${MAIL_MAILER}"
      MAIL_HOST: "${MAIL_HOST}"
      MAIL_PORT: "${MAIL_PORT}"
      MAIL_USERNAME: "${MAIL_USERNAME}"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
      APP_NAME: "${APP_NAME:-KanTrack}"
      APP_LOCALE: "${APP_LOCALE:-es}"
      LOG_CHANNEL: "daily"
      REGISTRY_HOST: "https://registry.fleetbase.io"
      REGISTRY_PREINSTALLED_EXTENSIONS: "true"
      OSRM_HOST: "https://router.project-osrm.org"
    depends_on:
      - database
      - cache
      - queue
    networks:
      - default
    restart: always
    mem_limit: 1024m
    mem_reservation: 512m
    pids_limit: 512
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc: 4096
    tmpfs:
      - /tmp:size=64m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  httpd:
    build:
      context: .
      dockerfile: docker/httpd/Dockerfile
    ports:
      - "8000:80"
    depends_on:
      application:
        condition: service_healthy
    mem_limit: 64m
    mem_reservation: 32m
    pids_limit: 100
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc: 2048
    tmpfs:
      - /tmp:size=32m

networks:
  default:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  fonts_cache:
    driver: local
