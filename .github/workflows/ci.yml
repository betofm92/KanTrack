name: Fleetbase CI

on:
  push:
    branches: [ 'deploy/*' ]
    tags:
      - 'v*'
  pull_request:
    branches: [ 'deploy/*' ]

jobs:
  build:
    name: Build and Start Docker Services
    runs-on: ubuntu-latest

    steps:
    - name: Configure git for private submodules
      run: |
        git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "git@github.com:"

    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.GH_PAT }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Prepare Composer Auth Secret
      run: |
        if [[ -n "${{ secrets._GITHUB_AUTH_TOKEN }}" ]]; then
          echo '{"github-oauth": {"github.com": "'${{ secrets._GITHUB_AUTH_TOKEN }}'"}}' > composer-auth.json
        else
          echo '{}' > composer-auth.json
        fi

    - name: Build and Release
      uses: docker/bake-action@v2
      with:
        files: |
          ./docker-bake.hcl
